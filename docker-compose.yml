version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: levelup_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secretpassword
    restart: unless-stopped
    networks:
      - levelup_net

  redis:
    image: redis:7-alpine
    container_name: levelup_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - levelup_net

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: levelup_server
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://admin:secretpassword@mongodb:27017/levelup?authSource=admin
      - JWT_SECRET=supersecret_jwt_key
      - JWT_EXPIRES_IN=7d
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped
    networks:
      - levelup_net

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: levelup_client
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - levelup_net

networks:
  levelup_net:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
